---
# 1. SPEICHERDEFINITION FÜR APP 1 (3 GB Persistent)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app1-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
# 2. SPEICHERDEFINITION FÜR APP 2 (3 GB Persistent)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app2-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
# 3. DEPLOYMENT FÜR APP 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    app: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: webtop
          image: mein-webtop-debian:latest # Hinweis: Muss in Ihrer Cluster-Registry liegen!
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 3000
          volumeMounts:
            # Mount für die Anwendungsdaten (Überlebt Neustarts)
            - name: app1-storage
              mountPath: /var/lib/meine-app-daten
            # Wichtig: Mount für Shared Memory (Verhindert Browser-Abstürze)
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: app1-storage
          persistentVolumeClaim:
            claimName: app1-data-pvc
        # Definiert 1GB Shared Memory im RAM analog zu --shm-size="1gb"
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
# 4. DEPLOYMENT FÜR APP 2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  labels:
    app: app2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: webtop
          image: mein-webtop-debian:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: app2-storage
              mountPath: /var/lib/meine-app-daten
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: app2-storage
          persistentVolumeClaim:
            claimName: app2-data-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
# 5. NETZWERK-ERREICHBARKEIT (SERVICES)
# In Kubernetes aktivieren Services die DNS-Namensauflösung untereinander.
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    app: app1
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: app2
spec:
  selector:
    app: app2
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
